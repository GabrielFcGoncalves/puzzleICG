<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>The Room - Handle Interaction</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <div id="ui">
        <h2>OBJECT: THE BRASS CABINET</h2>
        <div id="status">STATUS: LOCKED</div>
        <div id="instructions">Press SPACE to toggle hidden view | H for Hint</div>
        <div id="camera-pos">Camera: 3.0, 2.0, 4.0</div>
    </div>

    <div id="inventory">
        <div class="slot"></div>
        <div class="slot"></div>
        <div class="slot"></div>
        <div class="slot"></div>
    </div>
    <div id="ethereal-overlay"></div>
    <div id="drag-overlay"
        style="position:fixed; pointer-events:none; z-index:1000; width:200px; height:200px; display:none;"></div>
    
    <div id="inspection-overlay" style="position:fixed; top:0; left:0; width:100%; height:100%; pointer-events: none; z-index: 2000; display: none;">
        <div id="close-inspection" style="position: absolute; top: 30px; right: 30px; color: #00ffff; cursor: pointer; pointer-events: auto; font-family: 'Courier New', monospace; font-weight: bold; font-size: 18px;">[ CLOSE X ]</div>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>

    <script type="module" src="main.js"></script>
</body>

</html>
