<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>The Room - Handle Interaction</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #050505;
            font-family: 'Courier New', Courier, monospace;
        }

        canvas {
            cursor: grab;
            outline: none;
        }

        .grabbing {
            cursor: grabbing !important;
        }

        #ui {
            position: absolute;
            top: 30px;
            left: 30px;
            color: #00ffff;
            pointer-events: none;
            z-index: 100;
        }

        #ethereal-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            transition: 0.6s;
            opacity: 0;
            z-index: 10;
            background: radial-gradient(circle, rgba(0, 255, 255, 0.05) 0%, rgba(0, 0, 0, 0.8) 100%);
        }

        .active-ethereal {
            opacity: 1 !important;
        }
    </style>
</head>

<body>

    <div id="ui">
        <h2>OBJECT: THE BRASS CABINET</h2>
        <div id="status">STATUS: LOCKED</div>
        <div id="status">Press SPACE to toggle hidden view</div>
    </div>
    <div id="ethereal-overlay"></div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enablePan = false;
        camera.position.set(3, 2, 4);

        const mainLight = new THREE.PointLight(0xffffff, 150);
        mainLight.position.set(3, 5, 4);
        const backLight = new THREE.PointLight(0xccccff, 50);
        backLight.position.set(-4, 3, -5);
        scene.add(mainLight, backLight, new THREE.AmbientLight(0x888888));

        // --- Game State ---
        let isEthereal = false, isUnlocked = false, isDragging = false;
        const targetCode = [1, 2, 3, 4], currentCode = [0, 0, 0, 0];

        let currentDrawerZ = 0.2;
        let targetDrawerZ = 0.2;
        const heavyFactor = 0.07;

        const intersectionPoint = new THREE.Vector3();
        const offset = new THREE.Vector3();

        // --- Texture ---
        function createWheelTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 512; canvas.height = 64;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#111'; ctx.fillRect(0, 0, 512, 64);
            ctx.fillStyle = '#FFF'; ctx.font = 'bold 40px Arial';
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            for (let i = 0; i < 10; i++) { ctx.fillText(i.toString(), (i / 10) * 512 + 25.6, 32); }
            const tex = new THREE.CanvasTexture(canvas);
            tex.wrapS = THREE.RepeatWrapping;
            return tex;
        }
        const wheelSideTex = createWheelTexture();

        function createNoteTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 512; canvas.height = 320;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#fdfdf5';
            ctx.fillRect(0, 0, 512, 320);

            // Add some subtle lines like a real paper
            ctx.strokeStyle = '#e0e0d0';
            ctx.lineWidth = 1;
            for (let i = 40; i < 320; i += 40) {
                ctx.beginPath();
                ctx.moveTo(20, i);
                ctx.lineTo(492, i);
                ctx.stroke();
            }

            ctx.fillStyle = '#1a1a1a';
            ctx.font = 'italic 40px Georgia, serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('Congratulations', 256, 140);

            return new THREE.CanvasTexture(canvas);
        }
        const noteTex = createNoteTexture();

        function createClueTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 512; canvas.height = 256;
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, 512, 256);
            ctx.fillStyle = '#00ffff';
            ctx.font = 'bold 120px "Courier New"';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            // Add a glowing effect
            ctx.shadowColor = '#00ffff';
            ctx.shadowBlur = 15;
            ctx.fillText('1-2-3-4', 256, 128);
            return new THREE.CanvasTexture(canvas);
        }
        const clueTex = createClueTexture();

        // --- Objects ---
        const boxGroup = new THREE.Group();
        scene.add(boxGroup);

        const box = new THREE.Mesh(new THREE.BoxGeometry(2, 2, 2), new THREE.MeshStandardMaterial({ color: 0x2b1d0e }));
        boxGroup.add(box);

        const drawerGroup = new THREE.Group();
        const drawerMesh = new THREE.Mesh(new THREE.BoxGeometry(1.8, 0.8, 1.8), new THREE.MeshStandardMaterial({ color: 0x1a0f05 }));
        drawerGroup.add(drawerMesh);
        drawerGroup.position.set(0, -0.4, 0.2);
        boxGroup.add(drawerGroup);

        // --- NEW: THE HANDLE ---
        // Placing a metal ring handle on the upper front face of the drawer
        const handleGeom = new THREE.TorusGeometry(0.15, 0.03, 16, 100);
        const handleMat = new THREE.MeshStandardMaterial({ color: 0xaa8800, metalness: 0.9, roughness: 0.2 });
        const handle = new THREE.Mesh(handleGeom, handleMat);
        handle.position.set(0, 0.25, 0.92); // Front and high
        handle.rotation.x = Math.PI / 2;
        drawerGroup.add(handle);

        const note = new THREE.Mesh(new THREE.PlaneGeometry(1.2, 0.8), new THREE.MeshStandardMaterial({ map: noteTex }));
        note.rotation.x = -Math.PI / 2; note.position.set(0, 0.41, 0);
        drawerGroup.add(note);

        const cluePlane = new THREE.Mesh(
            new THREE.PlaneGeometry(1, 0.5),
            new THREE.MeshBasicMaterial({ map: clueTex, transparent: true, opacity: 0 })
        );
        cluePlane.position.set(0, 0, -1.01); cluePlane.rotation.y = Math.PI;
        boxGroup.add(cluePlane);
        // (Clue text omitted for brevity, logic remains same)

        const wheels = [];
        const wheelGeom = new THREE.CylinderGeometry(0.2, 0.2, 0.22, 60);
        wheelGeom.rotateZ(Math.PI / 2);
        const sideMat = new THREE.MeshStandardMaterial({ map: wheelSideTex, roughness: 0.3 });
        const capMat = new THREE.MeshStandardMaterial({ color: 0x111111 });

        for (let i = 0; i < 4; i++) {
            const wheel = new THREE.Mesh(wheelGeom, [sideMat, capMat, capMat]);
            wheel.position.set(-0.45 + (i * 0.3), -0.15, 0.95); // Lowered slightly to clear handle
            wheel.userData = { index: i, targetRot: 0 };
            drawerGroup.add(wheel);
            wheels.push(wheel);
        }

        // --- Interaction ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        window.addEventListener('mousedown', (e) => {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);

            // 1. Wheel Clicks
            const wheelHits = raycaster.intersectObjects(wheels);
            if (wheelHits.length > 0) {
                const w = wheelHits[0].object;
                currentCode[w.userData.index] = (currentCode[w.userData.index] + 1) % 10;
                w.userData.targetRot += (Math.PI * 2) / 10;
                checkPuzzle();
                return;
            }

            // 2. Handle Click (DRAG ONLY VALID ON HANDLE)
            const handleHit = raycaster.intersectObject(handle);
            if (handleHit.length > 0 && isUnlocked) {
                isDragging = true;
                controls.enabled = false;
                renderer.domElement.classList.add('grabbing');

                const groundPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), drawerGroup.position.y);
                raycaster.ray.intersectPlane(groundPlane, intersectionPoint);
                offset.copy(intersectionPoint).sub(drawerGroup.position);
            }
        });

        window.addEventListener('mousemove', (e) => {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);

            if (isDragging) {
                const groundPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), drawerGroup.position.y);
                if (raycaster.ray.intersectPlane(groundPlane, intersectionPoint)) {
                    targetDrawerZ = Math.max(0.2, Math.min(1.8, intersectionPoint.z - offset.z));
                }
            } else {
                const wheelHover = raycaster.intersectObjects(wheels);
                const handleHover = raycaster.intersectObject(handle);
                // Cursor changes to pointer ONLY on interactive elements
                renderer.domElement.style.cursor = (wheelHover.length > 0 || (handleHover.length > 0 && isUnlocked)) ? 'pointer' : 'grab';
            }
        });

        window.addEventListener('mouseup', () => {
            isDragging = false;
            controls.enabled = true;
            renderer.domElement.classList.remove('grabbing');
        });

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                isEthereal = !isEthereal;
                document.getElementById('ethereal-overlay').classList.toggle('active-ethereal');
            }
        });

        function checkPuzzle() {
            if (currentCode.every((v, i) => v === targetCode[i])) {
                isUnlocked = true;
                wheels.forEach(w => w.visible = false);
                document.getElementById('status').innerText = "STATUS: UNLOCKED (Grab handle)";
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            wheels.forEach(w => {
                w.rotation.x = THREE.MathUtils.lerp(w.rotation.x, w.userData.targetRot, 0.15);
            });
            currentDrawerZ = THREE.MathUtils.lerp(currentDrawerZ, targetDrawerZ, heavyFactor);
            drawerGroup.position.z = currentDrawerZ;

            if (currentDrawerZ > 1.5) document.getElementById('status').innerText = "CONGRATULATIONS";

            // Toggle clue visibility with smooth lerp
            cluePlane.material.opacity = THREE.MathUtils.lerp(cluePlane.material.opacity, isEthereal ? 1 : 0, 0.1);

            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>

</html>
