<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>The Room - Handle Interaction</title>
    <link rel="stylesheet" href="src/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400..700&display=swap" rel="stylesheet">
</head>

<body>
    <div id="loading-screen">
        <div class="loader-content">
            <h1>INITIATING WORLD...</h1>
            <div id="loader-bar-container">
                <div id="loader-bar"></div>
            </div>
            <p id="loader-text">0% - LOADING MODELS</p>
        </div>
    </div>

    <div id="ui">
        <h2>OBJECT: THE BRASS CABINET</h2>
        <div id="status">STATUS: LOCKED</div>
        <div id="instructions">Press SPACE to toggle hidden view</div>

    </div>

    <div id="inventory">
        <div class="slot"></div>
        <div class="slot"></div>
        <div class="slot"></div>
        <div class="slot"></div>
    </div>
    <div id="ethereal-overlay"></div>
    <div id="drag-overlay"
        style="position:fixed; pointer-events:none; z-index:1000; width:200px; height:200px; display:none;"></div>
    
    <div id="inspection-overlay" style="position:fixed; top:0; left:0; width:100%; height:100%; pointer-events: none; z-index: 2000; display: none;">
        <div id="close-inspection" style="position: absolute; top: 30px; right: 30px; color: #00ffff; cursor: pointer; pointer-events: auto; font-family: 'Courier New', monospace; font-weight: bold; font-size: 18px;">[ CLOSE X ]</div>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>

    <script type="module" src="src/main.js"></script>
</body>

</html>
